# Issue-driven news publishing (#634).
#
# Label an issue `news` and this workflow turns it into a post: it runs
# scripts/news-from-issue.py to append an item to src/_data/news.json (issue
# title → headline, body → excerpt, with optional `Type:` / `URL:` / `Date:`
# header lines), then opens the standard auto-PR (auto-merge armed, CI-gated).
# The PR body carries `Closes #<issue>`, so merging it closes the issue.
#
# The maintainer publishes by filing a labelled issue from a phone — the
# two-minute path #634 asks for. Sits on top of the News surface (#96) and
# the Atom feed (#605), which both read news.json.
#
# Action pins mirror the other workflows (SHA-pinned, CLAUDE.md §2).

name: Publish news from issue

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  # One run per issue, so re-labelling doesn't race itself; different issues
  # run independently.
  group: news-publish-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  publish:
    name: Append the news item and open an auto-PR
    if: github.event.label.name == 'news'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Append the news item
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -o pipefail
          export TODAY="$(date -u +%F)"
          python3 scripts/news-from-issue.py | tee /tmp/news-add.txt
          {
            echo "Auto-generated from issue #${ISSUE_NUMBER} (labelled \`news\`)."
            echo ""
            echo "Script output:"
            echo ""
            echo '```'
            cat /tmp/news-add.txt
            echo '```'
            echo ""
            echo "The item was appended to \`src/_data/news.json\`; it surfaces"
            echo "on the homepage \"Latest\" section, the \`/news\` archive, and"
            echo "the Atom feed. Edit the JSON entry in this PR to tweak the"
            echo "headline, excerpt, type, link, or date before merging."
            echo ""
            echo "Closes #${ISSUE_NUMBER}"
          } > /tmp/news-pr-body.md

      - name: Open or update the news PR
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: news/auto-${{ github.event.issue.number }}
          base: master
          delete-branch: true
          title: 'content(news): ${{ github.event.issue.title }}'
          commit-message: |
            content(news): publish item from issue #${{ github.event.issue.number }}

            Appended to src/_data/news.json by scripts/news-from-issue.py.
          body-path: /tmp/news-pr-body.md
          labels: |
            automated

      - name: Arm auto-merge on the news PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr="${{ steps.create-pr.outputs.pull-request-number }}"
          repo="${{ github.repository }}"
          for attempt in 1 2 3 4 5; do
            if gh pr merge "$pr" --squash --auto --repo "$repo"; then
              echo "Auto-merge armed (attempt $attempt)."
              exit 0
            fi
            state=$(gh pr view "$pr" --repo "$repo" \
              --json state,autoMergeRequest \
              -q '.state + " auto=" + ((.autoMergeRequest != null) | tostring)' || true)
            echo "Attempt $attempt failed; PR state: $state"
            case "$state" in
              MERGED*)    echo "Already merged."; exit 0 ;;
              *auto=true) echo "Auto-merge already enabled."; exit 0 ;;
            esac
            sleep 15
          done
          echo "::error::Could not arm auto-merge after 5 attempts."
          exit 1
