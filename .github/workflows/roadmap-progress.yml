# Refresh src/data/roadmap-progress.json from GitHub milestone progress.
#
# What this does
#   - Reads the repo's milestones, keeps the version-tagged ones
#     (vMAJOR.MINOR.PATCH), records closed / total / percent / due,
#     writes src/data/roadmap-progress.json.
#   - Opens an auto-PR on `roadmap-progress/auto` (auto-merge armed)
#     if the milestone data moved. No data change = no-op (the script
#     ignores the date when deciding whether to rewrite).
#
# What this feeds
#   The public roadmap (/roadmap.html + FR + DE). Its in-flight cards
#   carry data-milestone="vX.Y.Z"; assets/js/roadmap-progress.js reads
#   the JSON this workflow maintains and draws a progress bar +
#   promotes the next release to "In progress". See CLAUDE.md §5.1.
#
# Triggers on milestone + issue lifecycle events (the things that move
# a bar), plus a weekly belt-and-braces run and manual dispatch. It
# deliberately does NOT trigger on push to the JSON, to avoid the
# self-feeding loop that bit sync-roadmap.yml.
#
# Adapted from the sister repo EISSeuropa/netsec.github.io. EISS writes
# to src/data/ (Eleventy passthrough) rather than NetSec's repo-root
# data/, and the cron is sequenced after sync-roadmap.yml (06:00 Mon).

name: Sync roadmap progress

on:
  issues:
    types: [closed, reopened, deleted, milestoned, demilestoned]
  milestone:
    types: [created, closed, opened, edited, deleted]
  schedule:
    # Monday 06:30 UTC, after sync-roadmap.yml (06:00) and the daily
    # sync-indico (03:45) + scheduled-rebuild (04:15).
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: roadmap-progress
  cancel-in-progress: true

jobs:
  sync:
    name: Refresh src/data/roadmap-progress.json
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Refresh roadmap progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          python3 scripts/sync-roadmap-progress.py | tee /tmp/roadmap-progress.txt
          {
            echo "Auto-generated refresh of \`src/data/roadmap-progress.json\`"
            echo "from the repo's version milestones. Feeds the progress bars"
            echo "on the public roadmap (\`/roadmap.html\` + FR + DE)."
            echo ""
            echo "Script output:"
            echo ""
            echo '```'
            cat /tmp/roadmap-progress.txt
            echo '```'
            echo ""
            echo "---"
            echo "_Workflow: **Sync roadmap progress**, run_id \`${{ github.run_id }}\`, trigger \`${{ github.event_name }}\`._"
          } > /tmp/roadmap-progress-pr-body.md

      - name: Open or update PR if progress changed
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: roadmap-progress/auto
          base: master
          delete-branch: true
          title: 'chore(roadmap): refresh milestone progress data'
          commit-message: |
            chore(roadmap): refresh milestone progress data

            Auto-generated by scripts/sync-roadmap-progress.py.
            See the PR body for the per-milestone delta.
          body-path: /tmp/roadmap-progress-pr-body.md
          labels: |
            automated
            data-sync

      - name: Arm auto-merge on the auto-PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge \
            "${{ steps.create-pr.outputs.pull-request-number }}" \
            --squash --auto \
            --repo "${{ github.repository }}"
