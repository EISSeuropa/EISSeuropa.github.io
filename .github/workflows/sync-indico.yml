# Daily sync of src/_data/indico.json from the EISS Indico instance.
#
# Two outcomes per run
# --------------------
# The script always rewrites indico.json (the `syncedAt` timestamp moves
# every run) and tells the workflow whether the change is *substantive*
# (a real programme difference) or merely the timestamp.
#
#   - Substantive change  → open a reviewable PR on `indico-sync/auto`
#     whose body lists exactly what differs: sessions, papers, speakers,
#     co-authors, times, rooms, and abstracts added / removed / changed.
#     The maintainer sees precisely what a sync will alter before it goes
#     live, and merges with one click.
#   - Timestamp only      → nothing to commit. `syncedAt` is internal
#     metadata that nothing on the site renders, so a daily timestamp
#     bump isn't worth a commit. If a "Last refreshed" line is ever
#     surfaced, derive it from the daily scheduled-rebuild's build time
#     rather than committing a timestamp every day.
#
# (History: this path used to direct-commit the timestamp to master, and
# earlier still the whole workflow direct-committed. The PR path was added
# so programme changes near a conference are reviewable; the timestamp
# direct-commit was then dropped when branch protection began requiring
# PRs for every change to master — a daily no-op push only failed the job.)
#
# Failure handling
# ----------------
# If Indico is unreachable, sync-indico.py exits 1 and the workflow
# fails. The existing indico.json snapshot in the repo is not touched,
# so the site keeps working with the last good data. The only signal is
# a red badge on the Actions tab.

name: Sync events from Indico

on:
  schedule:
    # 03:45 UTC daily, 30 minutes BEFORE scheduled-rebuild (04:15 UTC).
    - cron: "45 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: indico-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Refresh indico.json from the export API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run sync script
        id: sync
        env:
          # Optional Indico API token (read-only, on a dedicated service
          # account). Unlocks endpoints that aren't anonymously accessible,
          # including the co-author lists behind each contribution. Without
          # it the sync still works for public endpoints. To set: repo
          # Settings → Secrets and variables → Actions → new secret named
          # `INDICO_API_TOKEN`.
          INDICO_API_TOKEN: ${{ secrets.INDICO_API_TOKEN }}
          # The script writes the "what changed" Markdown body here for the
          # PR step to consume.
          SYNC_INDICO_BODY_FILE: /tmp/indico-pr-body.md
        run: python3 scripts/sync-indico.py

      - name: Timestamp-only change — nothing to commit
        if: steps.sync.outputs.substantive != 'true'
        run: |
          echo "No substantive programme change; only the syncedAt timestamp moved."
          echo "syncedAt is internal metadata that nothing on the site renders, so a"
          echo "daily timestamp bump is not worth a commit — and master is protected"
          echo "(direct pushes are rejected; real changes go through the PR path"
          echo "above). Leaving master untouched."

      - name: Open detailed PR for substantive changes
        if: steps.sync.outputs.substantive == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: indico-sync/auto
          base: master
          delete-branch: true
          add-paths: src/_data/indico.json
          commit-message: "${{ steps.sync.outputs.title || 'data: sync events from Indico' }}"
          title: "${{ steps.sync.outputs.title || 'data: sync events from Indico' }}"
          body-path: /tmp/indico-pr-body.md
          labels: |
            automated
            data-sync
