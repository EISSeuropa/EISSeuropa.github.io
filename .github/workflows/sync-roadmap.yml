# Auto-refresh the `[Unreleased]` autostamp in docs/roadmap-2026.md.
#
# What this does
#   - Reads CHANGELOG.md, counts the bullets under [Unreleased] per
#     Keep-a-Changelog category (Added / Changed / Fixed / etc.),
#     finds the most recent SemVer tag.
#   - Rewrites the AUTOSTAMP block in docs/roadmap-2026.md with the
#     result.
#   - Opens a PR on `roadmap-sync/auto` (auto-merge armed) if the
#     stamp moved. If nothing changed, the workflow is a no-op.
#
# What this does NOT do
#   - Touch the prose timeline rows or the per-release narrative.
#     Those stay maintainer-written; the autostamp surfaces staleness
#     without claiming to fix it.
#   - Promote shipped releases. That's release.sh's responsibility
#     and a CLAUDE.md §5 cross-check item.
#
# Why
#   The roadmap doc tends to drift between releases because nothing
#   forces the count + freshness stamp to refresh. CLAUDE.md §11
#   rejected calendar / per-N-PRs thresholds in favour of "every
#   release", which works for the prose synthesis but means the count
#   itself is stale between releases. Automating the cheap part (the
#   count + freshness date) removes the burden without forcing prose
#   regeneration.
#
# Adapted from the sister repo
# EISSeuropa/netsec.github.io/.github/workflows/sync-roadmap.yml.
# Three adaptations for EISS: target branch is `master` not `main`;
# cron sequenced after the existing daily sync-indico (03:45) +
# scheduled-rebuild (04:15); the script handles the EISS three-hash
# category convention rather than NetSec's four-hash nesting.

name: Sync roadmap autostamp

on:
  push:
    branches: [master]
    paths:
      # Triggers only on the workflow's INPUTS, not its output. The
      # autostamp lives in docs/roadmap-2026.md, so a previous version
      # of this list included that file. That created a self-feeding
      # loop: the auto-PR's merge would touch the roadmap, retrigger
      # the workflow, possibly open another auto-PR if the count had
      # moved meanwhile, and so on. With several content PRs landing
      # close together the cycles overlapped and GitHub's anti-abuse
      # heuristic flagged the runs as disruptive, blocking other
      # workflow_dispatch calls for ~30 minutes. Listening to inputs
      # only breaks the loop cleanly.
      - 'CHANGELOG.md'
      - 'scripts/sync-roadmap.py'
      - '.github/workflows/sync-roadmap.yml'
  # Weekly belt-and-braces in case a push trigger ever misses
  # (e.g. workflow disabled momentarily for a fix). 06:00 UTC
  # Monday, sequenced after the daily sync-indico (03:45) and
  # scheduled-rebuild (04:15).
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: roadmap-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Refresh autostamp in docs/roadmap-2026.md
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # fetch-depth: 0 so `git tag --list --sort=-v:refname` sees
          # the full tag history. Shallow clones default to depth 1,
          # which loses tags.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Refresh autostamp
        run: |
          set -o pipefail
          python3 scripts/sync-roadmap.py | tee /tmp/sync-roadmap.txt
          {
            echo "Auto-generated update to \`docs/roadmap-2026.md\`'s"
            echo "machine-managed \`[Unreleased]\` autostamp."
            echo ""
            echo "Script output:"
            echo ""
            echo '```'
            cat /tmp/sync-roadmap.txt
            echo '```'
            echo ""
            echo "The autostamp counts bullets in \`CHANGELOG.md\`'s"
            echo "\`[Unreleased]\` section per category and freshness-stamps"
            echo "the date. The prose in the timeline rows themselves is"
            echo "untouched; refreshing that synthesis is a maintainer call"
            echo "at release-time §5 sweep."
            echo ""
            echo "---"
            echo "_Workflow: **Sync roadmap autostamp**, run_id \`${{ github.run_id }}\`, trigger \`${{ github.event_name }}\`._"
          } > /tmp/roadmap-sync-pr-body.md

      - name: Open or update PR if autostamp changed
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: roadmap-sync/auto
          base: master
          delete-branch: true
          title: 'docs(roadmap): refresh [Unreleased] autostamp'
          commit-message: |
            docs(roadmap): refresh [Unreleased] autostamp

            Auto-generated by scripts/sync-roadmap.py.
            See the PR body for the stamp delta.
          body-path: /tmp/roadmap-sync-pr-body.md
          labels: |
            automated
            documentation

      # Auto-merge so the autostamp ships without manual review. The
      # diff is mechanical (one blockquote line); CodeQL still runs
      # and a failing check would block the merge. Skipped when the
      # previous step found nothing to PR (pull-request-number empty).
      - name: Arm auto-merge on the auto-PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Arm auto-merge, retrying transient GitHub API hiccups (e.g. a
          # 504 Gateway Timeout on the enable-auto-merge call, which has
          # failed the job and left a dangling un-merged auto-PR). Treat
          # "already merged" / "auto-merge already enabled" as success so a
          # partial first attempt doesn't then fail the retry.
          pr="${{ steps.create-pr.outputs.pull-request-number }}"
          repo="${{ github.repository }}"
          for attempt in 1 2 3 4 5; do
            if gh pr merge "$pr" --squash --auto --repo "$repo"; then
              echo "Auto-merge armed (attempt $attempt)."
              exit 0
            fi
            state=$(gh pr view "$pr" --repo "$repo" \
              --json state,autoMergeRequest \
              -q '.state + " auto=" + ((.autoMergeRequest != null) | tostring)' || true)
            echo "Attempt $attempt failed; PR state: $state"
            case "$state" in
              MERGED*)    echo "Already merged."; exit 0 ;;
              *auto=true) echo "Auto-merge already enabled."; exit 0 ;;
            esac
            sleep 15
          done
          echo "::error::Could not arm auto-merge after 5 attempts."
          exit 1
