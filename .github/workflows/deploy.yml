# Build and deploy site to GitHub Pages.
#
# Triggers on push-to-master, on PR-into-master (for build validation),
# and via manual dispatch from the Actions tab.
#
# Known gotcha: GitHub Actions intentionally does NOT cascade workflow
# runs when a workflow's GITHUB_TOKEN does the merging. So if a PR is
# merged via `gh pr merge --auto --squash` and that auto-merge is
# resolved by the same GITHUB_TOKEN that opened the PR (e.g. the
# sync-roadmap auto-PR loop), this workflow does NOT fire on the
# resulting master push. Symptom: master has new commits, the live
# site is stale. Diagnosis: `gh run list --workflow=deploy.yml --limit
# 5` shows no run at the timestamp of the merge. Cure: push any commit
# manually (an empty commit works) or run this workflow via
# `gh workflow run deploy.yml --ref master` from a real user account.

name: Build and deploy site

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - run: npm install --no-audit --no-fund

      - run: npm run build

      # Build the static search index. Pagefind crawls the rendered
      # _site/ HTML and writes wasm + index shards to _site/pagefind/,
      # which the lazy import in assets/js/search.js loads at runtime.
      # Runs after Eleventy so it sees the final HTML. The index is built
      # here only, never committed (_site is gitignored), so local dev
      # has no index and the search modal degrades gracefully.
      - name: Build search index (Pagefind)
        run: npx -y pagefind --site _site

      - name: List build output
        run: |
          echo "=== _site root ==="
          ls -la _site/ | head -60
          echo "=== _site/.well-known ==="
          ls -la _site/.well-known/ 2>&1 || echo "MISSING"
          echo "=== root-level HTML count ==="
          find _site -maxdepth 1 -name '*.html' | wc -l
          echo "=== critical files ==="
          for f in CNAME .nojekyll robots.txt sitemap.xml index.html .well-known/apple-developer-merchantid-domain-association assets/images/index-meta.jpg; do
            if [ -e "_site/$f" ]; then echo "OK   $f"; else echo "MISS $f"; fi
          done

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
