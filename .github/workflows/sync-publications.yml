# Monthly refresh of the publication-match review queue
# (data/publication-candidates.json).
#
# What this does
#   - Runs scripts/match-publications.mjs --all: proposes, for each ESSC
#     paper without a confirmed published version, the later-published
#     article (with a DOI). Phase 1 anchors on members' ORCID records;
#     phase 2 anchors on the paper's authors via OpenAlex. Both are
#     fuzzy title matches over a publication-lag window. See
#     docs/publication-matching.md.
#   - Opens (or updates) a PR on `publications-sync/auto` with the
#     refreshed queue if it changed.
#
# Why this one does NOT auto-merge (unlike the orcid/bios/roadmap syncs)
#   The queue is a REVIEW surface, not data the site consumes. A
#   proposal is a fuzzy guess; recording a wrong one as a paper's
#   "published version" is a mis-citation on a scholarly site. So the
#   PR is opened for a human to read, and accepted matches are recorded
#   separately with `node scripts/confirm-publication.mjs <slug>` (which
#   writes src/_data/paperLinks.json — the file the build actually reads).
#   Nothing here changes the live site; merging the PR only keeps the
#   committed queue current.
#
# Monthly (not weekly): published versions appear slowly, and the full
# OpenAlex sweep is a few hundred polite API calls. The matcher skips
# papers that already have a confirmed link, so the queue shrinks as
# matches are confirmed.

name: Sync publication matches

on:
  schedule:
    - cron: '0 7 1 * *' # 07:00 UTC on the 1st of each month
  workflow_dispatch:
  push:
    branches: [master]
    # Re-run when the matcher itself changes. Deliberately NOT triggered
    # by src/_data/* (the corpus changes often); the cron + manual
    # dispatch cover routine refreshes.
    paths:
      - 'scripts/match-publications.mjs'
      - '.github/workflows/sync-publications.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: publications-sync
  cancel-in-progress: true

jobs:
  match:
    name: Refresh publication-match candidates for review
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run the publication matcher (ORCID + OpenAlex)
        run: |
          set -o pipefail
          node scripts/match-publications.mjs --all | tee /tmp/match.txt
          {
            echo "Auto-generated refresh of the publication-match **review queue**"
            echo "(\`data/publication-candidates.json\`) by \`scripts/match-publications.mjs --all\`."
            echo ""
            echo "**These are proposals, not decisions.** Each is a fuzzy match"
            echo "(same author, similar title) and must be checked by a human."
            echo "To accept one, run:"
            echo ""
            echo '```'
            echo "node scripts/confirm-publication.mjs <slug>"
            echo '```'
            echo ""
            echo "which records it in \`src/_data/paperLinks.json\` (the file the"
            echo "build reads) so it surfaces on that paper's \`/papers/<slug>\` page."
            echo "Merging this PR only keeps the committed queue current; it does"
            echo "not change the live site. See docs/publication-matching.md."
            echo ""
            echo "Matcher output:"
            echo ""
            echo '```'
            cat /tmp/match.txt
            echo '```'
            echo ""
            echo "---"
            echo "_Workflow: **Sync publication matches**, run_id \`${{ github.run_id }}\`, trigger \`${{ github.event_name }}\`._"
          } > /tmp/pub-sync-pr-body.md

      - name: Open or update the review PR if the queue changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: publications-sync/auto
          base: master
          delete-branch: true
          title: 'data(publications): refresh match candidates for review'
          commit-message: |
            data(publications): refresh match candidates

            Auto-generated by scripts/match-publications.mjs --all.
            Review queue only — confirm accepted matches with
            scripts/confirm-publication.mjs. See the PR body.
          body-path: /tmp/pub-sync-pr-body.md
          labels: |
            automated
            data-sync
