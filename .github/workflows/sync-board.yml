# Manual sync of src/_data/board.json from the EISS board-member bios
# Google Form.
#
# What this does
#   1. On manual dispatch (Actions → "Sync board bios from Google Form"
#      → Run workflow), reads the linked Google Sheet as CSV.
#   2. Builds new board.json entries from each row, downloads any new
#      headshots from Google Drive into src/assets/images/board/, and
#      preserves entries that haven't been re-submitted yet (matched by
#      name slug against the prior board.json).
#   3. If anything changed, opens or updates a pull request on the
#      branch `board-sync/auto` with the human-readable diff in the
#      body. If nothing changed, exits silently.
#   4. While scripts/board-source.json has no csv_url set (initial
#      state), the script no-ops cleanly so this workflow stays green
#      while the Google Form is still being set up.
#
# Why manual-only (no cron)
#   The board changes a few times a year, not weekly. A weekly cron
#   would produce mostly-empty no-op runs. Run this when you know
#   submissions are in.
#
# Where to look
#   - The sync logic lives in scripts/sync-board.py.
#   - The Sheet URL + column mapping live in scripts/board-source.json.
#   - The roster (who is on the board, their role + display order) lives
#     in scripts/board-roles.json.
#   - Set-up steps: docs/board-bios-setup.md.

name: Sync board bios from Google Form

on:
  workflow_dispatch: # Manual run from the Actions tab — no cron.

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: board-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Refresh board.json from Google Sheet
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run sync script and capture diff
        id: sync
        env:
          # Script writes a structured "What changed" Markdown body
          # here when something actually changed. The next block
          # appends the run-log footer.
          SYNC_BOARD_BODY_FILE: /tmp/sync-board-body.md
        run: |
          set -o pipefail
          python3 scripts/sync-board.py | tee /tmp/sync-board.txt
          {
            if [ -s /tmp/sync-board-body.md ]; then
              cat /tmp/sync-board-body.md
              echo ""
            else
              # Defensive: script didn't write a rich body (older
              # version, no changes, or it errored before emitting).
              # Fall back to the previous wrapper so the PR still
              # has *some* body.
              echo "Auto-detected changes from the board-bios Google Sheet"
              echo "(form linked from scripts/board-source.json)."
              echo ""
            fi
            echo "## Run log"
            echo ""
            echo '```'
            cat /tmp/sync-board.txt
            echo '```'
            echo ""
            echo "_Generated by the **Sync board bios from Google Form** workflow._"
            echo "_Triggered: \`${{ github.event_name }}\` · run_id: \`${{ github.run_id }}\`_"
          } > /tmp/board-pr-body.md

      - name: Open or update PR if board.json or photos changed
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: board-sync/auto
          base: master
          delete-branch: true
          # Title is computed by sync-board.py based on the kind of
          # change (photo-only, single update, addition, etc.) so the
          # PR list reads at a glance. Falls back to the generic
          # multi-change title when the script doesn't emit one (e.g.
          # version of the script that pre-dates this output).
          title: ${{ steps.sync.outputs.title || 'data: sync board bios from Google Form' }}
          commit-message: |
            data: sync board.json from Google Form

            Refreshed src/_data/board.json (and any new headshots in
            src/assets/images/board/) from the linked Google Sheet.
            See the PR body for the exact diff.
          body-path: /tmp/board-pr-body.md
          labels: |
            automated
            data-sync
