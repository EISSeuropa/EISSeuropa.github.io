# Refresh src/_data/netsecDirectory.json from the NetSec member directory.
#
# What this does
#   - Fetches NetSec's published directory-index.json
#     (https://netsec-cost.eu/directory-index.json), keeps the fields EISS
#     consumes, and rewrites src/_data/netsecDirectory.json.
#   - Opens a PR on `netsec-directory-sync/auto` (auto-merge armed) if the
#     snapshot moved. corpus.js then re-matches the directory against the
#     Anthology authors at build time (#966), so a new directory member who
#     is also an ESSC author gains a "NetSec profile" link, and a departed
#     one loses it.
#
# What this does NOT do
#   - Touch the matching logic or the reject list
#     (src/_data/netsecDirectoryRejects.json stays maintainer-edited).
#   - Hardcode NetSec's profile-URL scheme: the `url` is taken from the
#     published index, never derived here.
#
# Why
#   The Anthology stays fresh via the Indico sync; the directory side moves
#   independently as people join or leave NetSec. A scheduled re-fetch keeps
#   the cross-links current without manual upkeep. If the index is briefly
#   unreachable (or not published yet) the script leaves the last snapshot
#   in place and the run is a no-op.
#
# Mirrors the EISS sync-roadmap.yml plumbing (auto-PR + armed auto-merge).
# The fast path is repository_dispatch (type netsec-directory-changed), the
# mirror of the netsec-indico-dispatch EISS already fires toward NetSec.

name: Sync NetSec directory links

on:
  schedule:
    # Weekly, 06:30 UTC Monday — after sync-roadmap (06:00) and the daily
    # syncs, so it doesn't pile onto the same minute.
    - cron: '30 6 * * 1'
  # Fast path: NetSec pings us when its directory changes.
  repository_dispatch:
    types: [netsec-directory-changed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: netsec-directory-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Refresh netsecDirectory.json
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Fetch the directory index
        run: |
          set -o pipefail
          node scripts/sync-netsec-directory.mjs | tee /tmp/sync-netsec.txt
          {
            echo "Auto-generated refresh of \`src/_data/netsecDirectory.json\`"
            echo "from NetSec's published \`directory-index.json\`."
            echo ""
            echo "Script output:"
            echo ""
            echo '```'
            cat /tmp/sync-netsec.txt
            echo '```'
            echo ""
            echo "corpus.js re-matches the directory against the Anthology"
            echo "authors at build time (#966). The matching logic and the"
            echo "reject list are untouched."
            echo ""
            echo "---"
            echo "_Workflow: **Sync NetSec directory links**, run_id \`${{ github.run_id }}\`, trigger \`${{ github.event_name }}\`._"
          } > /tmp/netsec-sync-pr-body.md

      - name: Open or update PR if the snapshot changed
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: netsec-directory-sync/auto
          base: master
          delete-branch: true
          title: 'chore(data): refresh NetSec directory links'
          commit-message: |
            chore(data): refresh NetSec directory links

            Auto-generated by scripts/sync-netsec-directory.mjs from
            NetSec's published directory-index.json. See the PR body.
          body-path: /tmp/netsec-sync-pr-body.md
          labels: |
            automated
            data-sync

      - name: Arm auto-merge on the auto-PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr="${{ steps.create-pr.outputs.pull-request-number }}"
          repo="${{ github.repository }}"
          for attempt in 1 2 3 4 5; do
            if gh pr merge "$pr" --squash --auto --repo "$repo"; then
              echo "Auto-merge armed (attempt $attempt)."
              exit 0
            fi
            state=$(gh pr view "$pr" --repo "$repo" \
              --json state,autoMergeRequest \
              -q '.state + " auto=" + ((.autoMergeRequest != null) | tostring)' || true)
            echo "Attempt $attempt failed; PR state: $state"
            case "$state" in
              MERGED*)    echo "Already merged."; exit 0 ;;
              *auto=true) echo "Auto-merge already enabled."; exit 0 ;;
            esac
            sleep 15
          done
          echo "::error::Could not arm auto-merge after 5 attempts."
          exit 1
