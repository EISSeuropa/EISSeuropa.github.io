# Weekly refresh of src/_data/orcidWorks.json from members' public ORCID
# records.
#
# What this does
#   - For each board / community member in src/_data/board.json that
#     carries a links.orcid, fetches their recent public works from the
#     ORCID public API and keeps the top few by year.
#   - Rewrites src/_data/orcidWorks.json, which powers the "Recent
#     publications by our members" section on /outputs (#718).
#   - Opens a PR on `orcid-sync/auto` (auto-merge armed) if the file
#     moved. If nothing changed, the workflow is a no-op.
#
# Why a dedicated weekly cron (not piggybacked on sync-board.yml)
#   ORCID records change whenever a member publishes, independent of
#   whether the board roster changes. sync-board.yml is manual-only
#   (the board changes a few times a year), so hanging the ORCID
#   refresh off it would leave the data stale for months and make the
#   "refreshed weekly" framing on /outputs false. A weekly cron keeps
#   the section genuinely live without a manual trigger.
#
# Where to look
#   - The fetch logic lives in scripts/sync-orcid.py.
#   - The roster (who has an ORCID iD) comes from src/_data/board.json,
#     fed by the board-bios Google Form (see docs/board-bios-setup.md).
#
# Adapted from .github/workflows/sync-roadmap.yml: same SHA-pinned
# actions, same auto-merge-arming retry loop, target branch `master`.
# Cron sequenced after sync-roadmap (Monday 06:00 UTC).

name: Sync member ORCID works

on:
  push:
    branches: [master]
    paths:
      # Re-run when a member's ORCID iD is added/changed in the roster
      # or when the fetch logic changes. Does NOT listen to its own
      # output (orcidWorks.json) to avoid a self-feeding PR loop, the
      # same trap documented in sync-roadmap.yml.
      - 'src/_data/board.json'
      - 'scripts/sync-orcid.py'
      - '.github/workflows/sync-orcid.yml'
  # Weekly refresh: 06:30 UTC Monday, sequenced after the daily
  # sync-indico (03:45), scheduled-rebuild (04:15), and sync-roadmap
  # (06:00) so the Monday-morning sync jobs don't collide.
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: orcid-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Refresh src/_data/orcidWorks.json from ORCID
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Refresh member ORCID works
        run: |
          set -o pipefail
          python3 scripts/sync-orcid.py | tee /tmp/sync-orcid.txt
          {
            echo "Auto-generated refresh of \`src/_data/orcidWorks.json\`,"
            echo "which powers the \"Recent publications by our members\""
            echo "section on \`/outputs\` (#718)."
            echo ""
            echo "Script output:"
            echo ""
            echo '```'
            cat /tmp/sync-orcid.txt
            echo '```'
            echo ""
            echo "Pulled from members' public ORCID records. Each member's"
            echo "recent works are kept, top few by year. The board roster"
            echo "and ORCID iDs come from \`src/_data/board.json\`."
            echo ""
            echo "---"
            echo "_Workflow: **Sync member ORCID works**, run_id \`${{ github.run_id }}\`, trigger \`${{ github.event_name }}\`._"
          } > /tmp/orcid-sync-pr-body.md

      - name: Open or update PR if orcidWorks.json changed
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: orcid-sync/auto
          base: master
          delete-branch: true
          title: 'data(orcid): refresh member ORCID works'
          commit-message: |
            data(orcid): refresh member ORCID works

            Auto-generated by scripts/sync-orcid.py.
            See the PR body for the script output.
          body-path: /tmp/orcid-sync-pr-body.md
          labels: |
            automated
            data-sync

      # Auto-merge so the refresh ships without manual review. The diff
      # is mechanical (a regenerated JSON data file); CodeQL still runs
      # and a failing check would block the merge. Skipped when the
      # previous step found nothing to PR (pull-request-number empty).
      - name: Arm auto-merge on the auto-PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Arm auto-merge, retrying transient GitHub API hiccups (e.g. a
          # 504 Gateway Timeout on the enable-auto-merge call, which has
          # failed the job and left a dangling un-merged auto-PR). Treat
          # "already merged" / "auto-merge already enabled" as success so a
          # partial first attempt doesn't then fail the retry.
          pr="${{ steps.create-pr.outputs.pull-request-number }}"
          repo="${{ github.repository }}"
          for attempt in 1 2 3 4 5; do
            if gh pr merge "$pr" --squash --auto --repo "$repo"; then
              echo "Auto-merge armed (attempt $attempt)."
              exit 0
            fi
            state=$(gh pr view "$pr" --repo "$repo" \
              --json state,autoMergeRequest \
              -q '.state + " auto=" + ((.autoMergeRequest != null) | tostring)' || true)
            echo "Attempt $attempt failed; PR state: $state"
            case "$state" in
              MERGED*)    echo "Already merged."; exit 0 ;;
              *auto=true) echo "Auto-merge already enabled."; exit 0 ;;
            esac
            sleep 15
          done
          echo "::error::Could not arm auto-merge after 5 attempts."
          exit 1
