# Broken-link check.
#
# Runs scripts/check-links.sh against the built `_site/` on:
#   - every PR touching files that affect the built output (catches a
#     bad link before merge once we flip to gating mode, see below)
#   - weekly on master (catches external link rot; academic and
#     COST URLs sometimes shuffle, and we want to hear about it
#     within a week rather than weeks later when a visitor reports
#     it)
#   - manual dispatch from the Actions tab
#
# Status: **gating**. The script exits non-zero on any broken link
# (internal or external) and the workflow fails accordingly. The
# pre-existing untranslated-page nav-synthesis breakage that gated
# this workflow as advisory in PR #164 was resolved by #162's
# `localizedHref` filter, and the script now reports 0 broken links
# across all 1500+ internal references.
#
# Adapted from the sister repo
# EISSeuropa/netsec.github.io/.github/workflows/launch-qa-link-check.yml.
# Two adaptations: needs a Node + Eleventy build step to produce
# `_site/` before the script can walk it; cron sequence moves to
# 07:00 UTC Monday so it doesn't collide with the 06:00 sync-roadmap.
name: Link check

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/check-links.sh'
      - '.github/workflows/link-check.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.eleventy.js'
  schedule:
    # Weekly on Mondays at 07:00 UTC. After the 06:00 sync-roadmap
    # belt-and-braces; before workhours in Europe so a Monday-morning
    # external rot report lands at the start of the maintainer's week.
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: Resolve every internal + external link in `_site/`
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build site
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Run link check
        run: ./scripts/check-links.sh --quiet
