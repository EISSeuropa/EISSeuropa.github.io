<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img">
  <title>EISS</title>
  <!-- Brand-blue rounded square so the favicon stays visible on any
       tab background (light, dark, in-flight chrome themes). The
       inset top highlight matches the legacy .nav-brand-mark
       box-shadow style for visual continuity. -->
  <rect width="32" height="32" rx="6" fill="#007bc6"/>
  <rect width="32" height="1" fill="#ffffff" opacity="0.18"/>

  <!-- Simplified 4-dot constellation drawn directly in the 32x32
       space. The full-logo constellation has 7 dots + 7 lines
       spread across a 2.4:1 aspect — illegible at 16-32 px. This
       compresses to the visual essence: an asymmetric triangle of
       three dots with one outlier, suggesting a network without
       the full geometry. Dot sizes vary so the eye picks out a
       focal point (the upper-right dot, mirroring how the dark
       "i" tittle dot anchors the full mark). Strokes at 1.4 keep
       lines visible when downscaled to 16 px. -->
  <g stroke="white" stroke-width="1.4" stroke-linecap="round">
    <line x1="8"  y1="11" x2="22" y2="9"/>
    <line x1="22" y1="9"  x2="24" y2="18"/>
    <line x1="22" y1="9"  x2="16" y2="24"/>
    <line x1="24" y1="18" x2="16" y2="24"/>
  </g>
  <g fill="white">
    <circle cx="8"  cy="11" r="1.8"/>
    <circle cx="22" cy="9"  r="2.6"/>
    <circle cx="24" cy="18" r="1.8"/>
    <circle cx="16" cy="24" r="2.2"/>
  </g>
</svg>
